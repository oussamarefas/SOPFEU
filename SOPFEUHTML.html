<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOPFEU Widget</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: Segoe UI, sans-serif;
}

/* conteneur widget */
#widget {
    position: fixed;
    bottom: 20px;
    right: 20px;

    width: 320px;
    max-width: 90%;

    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);

    border-radius: 20px;
    padding: 12px;

    box-shadow: 0 8px 25px rgba(0,0,0,0.35);

    transition: all 0.3s ease;
}

/* responsive mobile / petite fenêtre */
@media (max-width: 400px) {
    #widget {
        width: 95%;
        right: 2.5%;
        bottom: 10px;
    }
}

/* hover effet widget */
#widget:hover {
    transform: scale(1.03);
}

/* SOPFEU widget */
#sopfeu-widget-container {
    width: 100%;
}
</style>
</head>

<body>

<div id="widget">
    <div data-sopfeu-lng="fr_CA"
         data-sopfeu-media="47"
         data-sopfeu-responsive="true"
         id="sopfeu-widget-container">
